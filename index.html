<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AG0001 — Chronos Boundary Flight</title>
  <style>
    :root {
      --bg: #08090c;
      --panel: rgba(255,255,255,0.055);
      --text: #f3f0e8;
      --muted: #a7a195;
      --gold: #c8a96a;
      --danger: #ff5c5c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 12%, rgba(200,169,106,0.14), transparent 34%),
        linear-gradient(180deg, #10131b 0%, var(--bg) 65%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .shell {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .frame {
      width: min(920px, 100%);
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
      align-items: stretch;
    }

    canvas {
      width: 100%;
      height: min(78vh, 760px);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
      border: 1px solid rgba(200,169,106,0.28);
      border-radius: 22px;
      box-shadow: 0 24px 90px rgba(0,0,0,0.55);
    }

    aside {
      padding: 22px;
      border: 1px solid rgba(200,169,106,0.22);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .metric {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-variant-numeric: tabular-nums;
    }

    .metric strong {
      color: var(--gold);
      font-weight: 650;
    }

    .keys {
      margin-top: 16px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(0,0,0,0.22);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .frame {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 68vh;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="frame">
      <canvas id="game" width="760" height="900" aria-label="Chronos Boundary Flight game canvas"></canvas>
      <aside>
        <h1>Chronos Boundary Flight</h1>
        <p>Ascend through the boundary field. Keep the control loop stable. Avoid unauthorized interference.</p>

        <div class="metric"><span>Altitude</span><strong id="altitude">0</strong></div>
        <div class="metric"><span>Stability</span><strong id="stability">100%</strong></div>
        <div class="metric"><span>Boundary</span><strong id="boundary">0</strong></div>

        <div class="keys">
          ← / A — move left<br>
          → / D — move right<br>
          Space — restart after crash
        </div>
      </aside>
    </section>
  </main>

  <script src="src/main.js"></script>
</body>
</html>
